<div class="auth-wrapper">
  <div class="glow-bg"></div>
  
  <div class="auth-container">
    <div class="logo-area" routerLink="/">
      <span class="nexus-logo">Nexus</span>
    </div>

    <div class="auth-card" *ngIf="!isSubmitted">
      <div class="card-header">
        <h1>Recover <span class="highlight">Access</span></h1>
        <p>Enter your elite email address to receive a recovery link.</p>
      </div>

      <form (ngSubmit)="onSubmit()" #resetForm="ngForm" class="auth-form">
        <div class="input-group">
          <label for="email">Verify Email</label>
          <div class="input-wrapper">
            <span class="material-icons">alternate_email</span>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="name@example.com"
              [(ngModel)]="email"
              required
              email
              #emailField="ngModel"
            >
          </div>
        </div>

        <button type="submit" class="btn-primary auth-submit" [disabled]="!resetForm.form.valid">
          Send Recovery Link
          <span class="material-icons">send</span>
        </button>
      </form>

      <div class="card-footer">
        <p>Remembered your password? <a routerLink="/login" class="highlight-link">Back to login</a></p>
      </div>
    </div>

    <div class="auth-card success-card" *ngIf="isSubmitted">
      <div class="card-header">
        <div class="success-icon">
            <span class="material-icons">check_circle</span>
        </div>
        <h1>Link <span class="highlight">Sent</span></h1>
        <p>If an account exists for <strong>{{ email }}</strong>, you will receive a recovery link shortly.</p>
      </div>
      <button class="btn-primary auth-submit" routerLink="/login">
          Back to Login
      </button>
    </div>
    
    <div class="back-home">
        <a routerLink="/"><span class="material-icons">west</span> Return to Home</a>
    </div>
  </div>
</div>
