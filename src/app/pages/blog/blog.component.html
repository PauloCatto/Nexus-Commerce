<app-header></app-header>

<main class="blog-page container">
  <header class="blog-header">
    <span class="badge">Nexus Articles</span>
    <h1>Our Tech <span class="highlight">Insights</span></h1>
    <p>Dive into the world of professional tech, gaming setups, and productivity guides.</p>
  </header>

  <div class="blog-grid">
    <a [routerLink]="['/post', post.title.toLowerCase().split(' ').join('-')]" class="post-card" *ngFor="let post of posts">
      <div class="post-image-wrapper">
        <img [src]="post.image" [alt]="post.title" class="post-img">
        <span class="post-category">{{ post.category }}</span>
      </div>
      <div class="post-content">
        <span class="post-date">{{ post.date }}</span>
        <h3 class="post-title">{{ post.title }}</h3>
        <p class="post-excerpt">{{ post.excerpt }}</p>
        <span class="read-more">Read Article <span class="material-icons">arrow_forward</span></span>
      </div>
    </a>
  </div>
</main>

<app-footer></app-footer>
