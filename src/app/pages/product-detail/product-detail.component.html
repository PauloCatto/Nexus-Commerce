<app-header></app-header>

<main class="product-page container" *ngIf="product">
  <div class="product-layout">
    <div class="product-gallery">
      <div class="main-image-wrapper">
        <img [src]="product.image" [alt]="product.name" class="main-prod-img">
      </div>
    </div>

    <div class="product-details">
      <nav class="breadcrumb">
        <a routerLink="/">Home</a> / <a routerLink="/shop">Products</a> / {{ product.name }}
      </nav>

      <h1 class="product-title">{{ product.name }}</h1>
      <p class="product-subtitle" *ngIf="product.subtitle">{{ product.subtitle }}</p>

      <div class="product-price-row">
        <span class="price-val">${{ product.price }}</span>
        <span class="stock-badge">In Stock</span>
      </div>

      <div class="divider"></div>

      <p class="product-description">
        {{ product.description }}
      </p>

      <div class="specs-grid" *ngIf="product.specs">
        <div class="spec-item" *ngFor="let spec of product.specs">
          <span class="label">{{ spec.label }}:</span>
          <span class="value">{{ spec.value }}</span>
        </div>
      </div>

      <div class="actions">
        <div class="quantity-picker">
          <button class="qty-btn" (click)="updateQty(-1)">-</button>
          <span class="qty-val">{{ selectedQuantity }}</span>
          <button class="qty-btn" (click)="updateQty(1)">+</button>
        </div>
        <button class="btn-primary add-to-cart-btn" (click)="addToCart()">
          Add to Cart
          <span class="material-icons">shopping_cart</span>
        </button>
        <button class="btn-outline favorite-btn-square" [class.active]="cartService.isInWishlist(product.name)" (click)="toggleWishlist()" [title]="cartService.isInWishlist(product.name) ? 'Remove from Wishlist' : 'Add to Wishlist'">
          <span class="material-icons">{{ cartService.isInWishlist(product.name) ? 'favorite' : 'favorite_border' }}</span>
        </button>
      </div>
    </div>
  </div>
</main>

<app-footer></app-footer>
