<app-header></app-header>

<main class="shop-page container">
  <header class="shop-header">
    <h1>All <span class="highlight">Products</span></h1>
    <p>Discover our range of premium technological devices.</p>
  </header>

  <div class="mobile-filters">
    <div class="filter-chips">
      <div *ngFor="let cat of categories" 
            (click)="setCategory(cat)" 
            [class.active]="activeCategory === cat"
            class="chip">
        {{ cat }}
      </div>
    </div>
  </div>

  <div class="shop-content">
    <aside class="filters">
      <h3>Categories</h3>
      <div class="filter-group">
        <ul>
          <li *ngFor="let cat of categories" 
              (click)="setCategory(cat)" 
              [class.active]="activeCategory === cat">
            <span class="dot" *ngIf="activeCategory === cat"></span>
            {{ cat }}
          </li>
        </ul>
      </div>
    </aside>

    <div class="products-grid">
      <div *ngIf="isLoadingProducts" class="loading-state" style="grid-column: 1 / -1; text-align: center; padding: 4rem; color: #ccc;">
        <span class="material-icons" style="font-size: 4rem; animation: spin 2s linear infinite;">sync</span>
        <p style="margin-top: 1rem; font-size: 1.2rem;">Fetching live database...</p>
      </div>

      <ng-container *ngIf="!isLoadingProducts">
        <div class="product-card-wrapper" *ngFor="let prod of filteredProducts">
          <a [routerLink]="['/product', prod.name.toLowerCase().split(' ').join('-')]" class="product-card">
            <div class="img-wrapper">
              <img [src]="prod.image" [alt]="prod.name">
              <button class="favorite-btn" [class.active]="cartService.isInWishlist(prod.name)" (click)="toggleWishlist(prod, $event)">
                <span class="material-icons">{{ cartService.isInWishlist(prod.name) ? 'favorite' : 'favorite_border' }}</span>
              </button>
            </div>
            <div class="info">
              <span class="category-tag">{{ prod.category }}</span>
              <h3>{{ prod.name }}</h3>
              <div class="card-footer">
                <p class="price">${{ prod.price }}</p>
                <button class="add-cart-btn" (click)="addToCart(prod, $event)">
                  <span class="material-icons">shopping_bag</span>
                </button>
              </div>
            </div>
          </a>
        </div>
      </ng-container>
    </div>
  </div>
</main>

<app-footer></app-footer>
