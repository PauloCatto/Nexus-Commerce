<app-header></app-header>

<main class="shop-page container">
  <header class="shop-header">
    <h1>All Products</h1>
    <p>Discover our range of premium technological devices.</p>
  </header>

  <div class="shop-content">
    <aside class="filters">
      <h3>Categories</h3>
      <div class="filter-group">
        <ul>
          <li *ngFor="let cat of categories" 
              (click)="setCategory(cat)" 
              [class.active]="activeCategory === cat">
            <span class="dot" *ngIf="activeCategory === cat"></span>
            {{ cat }}
          </li>
        </ul>
      </div>
    </aside>

    <div class="products-grid">
      <a [routerLink]="['/product', prod.name.toLowerCase().split(' ').join('-')]" class="product-card" *ngFor="let prod of filteredProducts">
        <div class="img-wrapper">
          <img [src]="prod.image" [alt]="prod.name">
        </div>
        <div class="info">
          <h3>{{ prod.name }}</h3>
          <p class="price">${{ prod.price }}</p>
          <button class="btn-primary">View Details</button>
        </div>
      </a>
    </div>
  </div>
</main>

<app-footer></app-footer>
