<header class="header">
      <div class="container flex items-center justify-between">
        <div class="logo" routerLink="/" style="cursor: pointer;">Nexus</div>
        
        <nav class="nav-links">
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
          <a routerLink="/shop" routerLinkActive="active">Shop</a>
          <a routerLink="/story" routerLinkActive="active">Our Story</a>
          <a routerLink="/blog" routerLinkActive="active">Blog</a>
          <a routerLink="/contact" routerLinkActive="active">Contact Us</a>
        </nav>

        <div class="actions flex items-center gap-6">
          <div class="icons flex gap-4">
            <span class="material-icons">search</span>
            <span class="material-icons">favorite_border</span>
            <span class="material-icons">shopping_cart</span>
          </div>
          <button class="btn-primary">Login</button>
        </div>
      </div>
    </header>
